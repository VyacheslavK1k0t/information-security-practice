services:
  api:
    build: .
    container_name: dean_office_api
    ports:
      - "3010:3010"
    volumes:
      - .:/app_code               # Hot-reload коду
      - db_data:/app_code/data    # Персистентність БД
    environment:
      - PYTHONUNBUFFERED=1
      - JWT_SECRET_KEY=my-super-safe-dev-secret-key-32-chars-long!!
      - ENCRYPTION_KEY=zICmrM216JK89qlyKLgxUxaDXLEeG-6B90dS52Izv3Y=
    restart: unless-stopped

volumes:
  db_data: